<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>中文闯关测验 🎮</title>
<style>
body {
    font-family: "Microsoft YaHei", Arial;
    text-align: center;
    padding: 40px;
    background-color: #fffbe6;
}

h1 {
    color: #ff6f61;
    margin-bottom: 20px;
}

/* 顶部导航按钮 */
.icon-button {
    display: inline-block;
    font-size: 36px;
    padding: 15px 25px;
    margin: 0 20px;
    background-color: #ffcc00;
    color: black;
    text-decoration: none;
    border-radius: 15px;
}
.icon-button:hover {
    background-color: #ffb347;
}

/* 答案按钮 */
.button {
    display: inline-block;
    font-size: 36px;
    padding: 15px 30px;
    margin: 15px;
    cursor: pointer;
    border-radius: 15px;
    background-color: #ffcc00;
    color: black;
}
.button:hover {
    background-color: #ffb347;
}

/* 结果提示 */
#result {
    font-size: 28px;
    margin-top: 20px;
    height: 40px;
}

/* 分数显示 */
#score {
    font-size: 24px;
    margin-top: 10px;
}
</style>
</head>
<body>

<h1>中文闯关测验 🎮</h1>

<!-- 顶部导航 -->
<div style="margin-bottom: 30px;">
    <a href="book1_lesson1_study.html" class="icon-button">📚 学习</a>
    <a href="quiz.html" class="icon-button">🕹️ 闯关</a>
</div>

<!-- 问题区（只显示发音按钮） -->
<div id="question"></div>

<!-- 答案选项 -->
<div id="options"></div>

<!-- 答题结果 -->
<div id="result"></div>

<!-- 当前分数 -->
<div id="score"></div>

<script>
// 闯关关卡数据
let levels = [
    { // 第一关
        questions: [
            {word:"猫", choices:["猫","狗","苹果"], answer:"猫"},
            {word:"狗", choices:["猫","狗","苹果"], answer:"狗"},
            {word:"苹果", choices:["猫","狗","苹果"], answer:"苹果"}
        ]
    },
    { // 第二关
        questions: [
            {word:"鸟", choices:["鸟","鱼","牛"], answer:"鸟"},
            {word:"鱼", choices:["鸟","鱼","牛"], answer:"鱼"},
            {word:"牛", choices:["鸟","鱼","牛"], answer:"牛"}
        ]
    }
];

let currentLevel = 0;
let currentQuestion = 0;
let score = 0;

// 显示问题
function showQuestion() {
    const q = levels[currentLevel].questions[currentQuestion];
    
    // 问题区只显示发音按钮
    document.getElementById("question").innerHTML = `
        <button class="button" onclick="playSound('${q.word}')">🔊 发音</button>
    `;

    // 显示答案按钮
    let optionsHTML = "";
    q.choices.forEach(choice => {
        optionsHTML += `<button class="button" onclick="checkAnswer('${choice}')">${choice}</button>`;
    });
    document.getElementById("options").innerHTML = optionsHTML;

    // 清空结果显示
    document.getElementById("result").innerText = "";
    document.getElementById("score").innerText = "分数: " + score;
}

// 发音功能
function playSound(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "zh-CN";
    speechSynthesis.speak(utterance);
}

// 检查答案
function checkAnswer(choice) {
    const q = levels[currentLevel].questions[currentQuestion];
    choice = choice.trim();
    let answer = q.answer.trim();

    if(choice === answer){
        document.getElementById("result").innerText = "✅ 正确！";
        score++;
    } else {
        document.getElementById("result").innerText = "❌ 错误，再试试！";
    }

    currentQuestion++;

    if(currentQuestion < levels[currentLevel].questions.length){
        setTimeout(()=>{ showQuestion(); }, 1000);
    } else {
        // 本关结束
        if(currentLevel + 1 < levels.length){
            currentLevel++;
            currentQuestion = 0;
            document.getElementById("result").innerText = `🎉 本关完成！当前分数: ${score}`;
            setTimeout(()=>{ showQuestion(); }, 2000);
        } else {
            document.getElementById("result").innerText = `🏆 游戏结束！总分: ${score}`;
            document.getElementById("options").innerHTML = "";
            document.getElementById("question").innerHTML = "";
        }
    }
}

// 初始化
showQuestion();
</script>

</body>
</html>
