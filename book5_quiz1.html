<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>中文闯关测验 🎮</title>
<style>
body {
    font-family: "Microsoft YaHei", Arial;
    text-align: center;
    padding: 40px;
    background-color: #fffbe6;
    transition: 0.3s;
}
h1 { color: #ff6f61; }
.button, .icon-button {
    display: inline-block;
    font-size: 30px;
    padding: 15px 25px;
    margin: 15px;
    border-radius: 15px;
    background-color: #ffcc00;
    color: black;
    cursor: pointer;
    text-decoration: none;
}
.button:hover, .icon-button:hover { background-color: #ffb347; }
#result { font-size: 28px; margin-top: 20px; height: 40px; }
#score { font-size: 22px; }
</style>
</head>
<body>

<h1>中文闯关测验 🎮</h1>

<div id="question"></div>
<div id="options"></div>
<div id="result"></div>
<div id="score"></div>

<br><br>
<div id="congratulations" class="icon-button"></div>
<br><br>
<a href="book5_quiz1.html" class="icon-button" id="again"></a>
<br><br>
<a href="book5_lesson1.html">📚 去学习</a>
<a href="book5_game1.html">🕹️ 去玩儿小游戏</a>

<script>
// 关卡数据（可为多音字指定 sound）
let levels = [
    {
        questions: [
            {word:"超", choices:["超","市","颜"], answer:"超"},
            {word:"市", choices:["市","超","练"], answer:"市"},
            {word:"各", choices:["各","许","品"], answer:"各"},
            {word:"颜", choices:["颜","漂","行"], answer:"颜"},
            {word:"练", choices:["练","尺","支"], answer:"练"}
        ]
    },
    {
        questions: [
            {word:"许", choices:["许","同","准"], answer:"许"},
            {word:"尺", choices:["尺","米","寸"], answer:"尺"},
            {word:"支", choices:["支","枝","笔"], answer:"支"},
            {word:"行", choices:["行","商","超"], answer:"行", sound:"xíng"},
            {word:"漂", choices:["漂","颜","行"], answer:"漂", sound:"piào"}
        ]
    },
    {
        questions: [
            {word:"商", choices:["商","店","买"], answer:"商"},
            {word:"鞋", choices:["鞋","靴","袜"], answer:"鞋"},
            {word:"品", choices:["品","货","物"], answer:"品"},
            {word:"制", choices:["制","做","作"], answer:"制"}
        ]
    }
];

let currentLevel = 0;
let remainingQuestions = []; // 本关剩余题
let currentQ = null;
let score = 0;

// 解锁语音
document.body.addEventListener('click', function unlockAudio() {
    speechSynthesis.speak(new SpeechSynthesisUtterance(''));
    speechSynthesis.cancel();
    document.body.removeEventListener('click', unlockAudio);
});

// 出题
function showQuestion() {
    if(remainingQuestions.length === 0){
        // 本关完成
        document.getElementById("result").innerText = `🎉 本关完成！当前分数: ${score}`;
        setTimeout(() => {
            currentLevel++;
            if(currentLevel < levels.length){
                startLevel();
            } else {
                document.getElementById("result").innerText = `🏆 游戏结束！总分: ${score}`;
                document.getElementById("congratulations").innerText = "🌟 太棒了！你学会了所有生字！";
                document.getElementById("options").innerHTML = "";
                document.getElementById("question").innerHTML = "";
                document.getElementById("again").innerText = "🔁 再玩一次";
            }
        }, 2000);
        return;
    }

    // 从剩余题中随机取
    let index = Math.floor(Math.random() * remainingQuestions.length);
    currentQ = remainingQuestions[index];

    document.getElementById("question").innerHTML =
        `<button class="button" onclick="playSound('${currentQ.sound||currentQ.word}')">🔊 发音</button>`;

    let html = "";
    currentQ.choices.forEach(c => {
        html += `<button class="button" onclick="checkAnswer('${c}')">${c}</button>`;
    });
    document.getElementById("options").innerHTML = html;

    document.getElementById("score").innerText = `分数: ${score}`;

    // 自动朗读
    setTimeout(() => playSound(currentQ.sound||currentQ.word), 300);
}

// 发音（稍慢）
function playSound(text){
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "zh-CN";
    utterance.rate = 0.6; // 略慢
    let voices = speechSynthesis.getVoices();
    let zhVoice = voices.find(v=>v.lang==="zh-CN") || voices.find(v=>v.lang.includes("zh"));
    if(zhVoice) utterance.voice = zhVoice;
    speechSynthesis.speak(utterance);
}

// 判断答案
function checkAnswer(choice){
    if(choice === currentQ.answer){
        score++;
        // 从剩余题中移除
        remainingQuestions = remainingQuestions.filter(q=>q!==currentQ);
        showQuestion();
    } else {
        document.getElementById("result").innerText = "❌ 再想一想";
        setTimeout(()=>playSound(currentQ.sound||currentQ.word),500);
    }
}

// 开始本关
function startLevel(){
    remainingQuestions = [...levels[currentLevel].questions];
    showQuestion();
}

// 初始化
startLevel();

</script>
</body>
</html>
