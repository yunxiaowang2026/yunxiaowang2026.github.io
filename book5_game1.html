<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<title>中文小游戏 🎮</title>

<style>
body {
    font-family: "Microsoft YaHei", Arial;
    background-color: #fffbe6;
    text-align: center;
    padding: 40px;
}

h1 {
    color: #ff6f61;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    background-color: #ffcc00;
}

.option {
    display: inline-block;
    margin: 20px;
    padding: 20px;
    font-size: 40px;
    border: 3px solid #ccc;
    border-radius: 10px;
    cursor: pointer;
    width: 100px;
    background-color: white;
}

#result {
    font-size: 24px;
    margin-top: 20px;
}
</style>

</head>

<body>

<h1>🎮 听声音选汉字</h1>

<button onclick="playSound()">🔊 播放声音</button>

<div>
    <div class="option" onclick="checkAnswer('超')">超</div>
    <div class="option" onclick="checkAnswer('市')">市</div>
    <div class="option" onclick="checkAnswer('各')">各</div>
    <div class="option" onclick="checkAnswer('颜')">颜</div>
    <div class="option" onclick="checkAnswer('练')">练</div>
    <div class="option" onclick="checkAnswer('许')">许</div>
    <div class="option" onclick="checkAnswer('漂')">漂</div>
    <div class="option" onclick="checkAnswer('尺')">尺</div>
    <div class="option" onclick="checkAnswer('刀')">刀</div>
    <div class="option" onclick="checkAnswer('支')">支</div>
    <div class="option" onclick="checkAnswer('行')">行</div>
    <div class="option" onclick="checkAnswer('商')">商</div>
    <div class="option" onclick="checkAnswer('鞋')">鞋</div>
    <div class="option" onclick="checkAnswer('品')">品</div>
    <div class="option" onclick="checkAnswer('制')">制</div>
</div>

<div id="result"></div>

<br><br>

<a href="book5_quiz1.html">🎮 去闯关</a>

<script>
let words = ["猫", "狗", "苹果"];
let currentWord = "";

function playSound() {
    currentWord = words[Math.floor(Math.random() * words.length)];

    const utterance = new SpeechSynthesisUtterance(currentWord);
    utterance.lang = "zh-CN";
    speechSynthesis.speak(utterance);

    document.getElementById("result").innerText = "";
}

function checkAnswer(choice) {
    if (choice === currentWord) {
        document.getElementById("result").innerText = "✅ 太棒了！答对了！";
    } else {
        document.getElementById("result").innerText = "❌ 再试一次！";
    }
}
</script>

</body>

</html>
