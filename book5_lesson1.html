<script>
function speak(el) {
    let word = el.querySelector('.chinese').innerText.trim();

    // ⭐ 多音字修正
    let text = word;

    if (word === "行") text = "银行的行";
    if (word === "漂") text = "漂亮的漂";

    speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "zh-CN";

    speechSynthesis.speak(utterance);
}
</script>
